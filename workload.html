<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platform — Workload</title>
<style>
  :root{
    --bg:#0f1419; --panel:#161c24; --grid:#2a323d;
    --ink:#e8edf2; --ink-dim:#8a94a0; --head:#1b222b;
    --today:#1f2d3d; --offday:#11161c; --slot:#141a21;
    --s-working:#fdab3d; --s-done:#00c875; --s-stuck:#df2f4a;
    --s-check:#ff6d3b; --s-planned:#579bfc; --s-standby:#007eb5;
    --s-test:#bb3354; --s-valid:#ff007f; --s-none:#3a4450;
    --p-dock:#e63946; --p-sail:#ff6b35; --p-when:#f7b538;
    --p-nice:#7ec8e3; --p-hold:#b0b0b0;
    --font:"Inter","Segoe UI",system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--font);overflow:hidden}
  .topbar{display:flex;align-items:center;justify-content:space-between;
    padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--grid)}
  .topbar h1{font-size:18px;font-weight:700;letter-spacing:.5px}
  .topbar h1 span{color:var(--s-planned)}
  .controls{display:flex;align-items:center;gap:8px}
  .controls button{background:var(--head);color:var(--ink);border:1px solid var(--grid);
    border-radius:6px;padding:6px 12px;font-size:14px;cursor:pointer;font-family:var(--font)}
  .controls button:hover{background:var(--grid)}
  .zoom-control{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink-dim)}
  .zoom-control input[type="range"]{width:80px;cursor:pointer}
  #zoom-value{min-width:35px}
  .meta{font-size:11px;color:var(--ink-dim);min-width:130px;text-align:right}
  .legend{display:flex;gap:13px;flex-wrap:wrap;align-items:center}
  .legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}
  .legend span{font-size:12px;color:var(--ink-dim)}

  .layout{display:flex;height:calc(100% - 54px)}
  .wrap{flex:1;min-width:0;overflow:auto}
  table{border-collapse:collapse;width:100%;table-layout:fixed}
  th,td{border:1px solid var(--grid);vertical-align:top}
  thead th{position:sticky;top:0;z-index:3;background:var(--head);
    padding:6px 4px;font-size:13px;font-weight:600;text-align:center}
  thead th.namecol{z-index:4;left:0;text-align:left;padding-left:12px;width:140px}
  thead th .dow{display:block;font-size:11px;color:var(--ink-dim);font-weight:500}
  thead th.today{background:var(--today);color:#fff}
  thead th.weekend,thead th.weekend .dow{color:#6b7686}
  thead th.ampm{font-size:10px;color:var(--ink-dim);font-weight:600;padding:2px}
  thead th.day-col{border-left:2px solid #3d4a5c}
  thead th.ampm.am{border-left:2px solid #3d4a5c}
  td.name{position:sticky;left:0;z-index:2;background:var(--panel);
    font-weight:600;font-size:13px;padding:6px 8px;width:140px;cursor:pointer;vertical-align:middle}
  td.name:hover{background:var(--head)}
  td.slot.day-off{background:#2d1f1f !important}
  td.slot.day-off::after{content:"✕";position:absolute;top:50%;left:50%;
    transform:translate(-50%,-50%);font-size:18px;color:#5a3a3a;pointer-events:none}
  td.slot{position:relative}
  .days-off-popup{position:fixed;background:var(--panel);
    border:1px solid var(--grid);border-radius:6px;padding:10px 12px;z-index:100;
    min-width:140px;box-shadow:0 6px 20px rgba(0,0,0,.5)}
  .days-off-popup .popup-title{font-size:10px;text-transform:uppercase;
    color:var(--ink-dim);margin-bottom:8px;letter-spacing:.5px}
  .days-off-popup label{display:flex;align-items:center;gap:8px;padding:5px 0;
    font-size:13px;cursor:pointer;color:var(--ink)}
  .days-off-popup label:hover{color:#fff}
  .days-off-popup input[type="checkbox"]{width:16px;height:16px;accent-color:var(--s-stuck);cursor:pointer}
  .days-off-popup .day-checked{color:var(--s-stuck);text-decoration:line-through}
  td.slot{padding:3px;background:var(--slot)}
  td.slot.am{border-left:2px solid #3d4a5c}
  td.slot.pm{background:#11161d}
  td.today{background:var(--today)} td.weekend{background:var(--offday)}
  td.slot.dragover{background:#26405e;outline:2px dashed var(--s-planned);outline-offset:-2px}
  tbody tr:nth-child(even) td.name{background:#12181f}
  tbody tr.row-unassigned td{background:#191f2a;border-top:2px solid var(--s-planned)}
  tbody tr.row-unassigned td.name{background:#1d2533}

  .chip,.chip-prio{position:relative;display:block;border-radius:4px;padding:2px 10px 2px 12px;
    margin-bottom:2px;font-size:10px;line-height:1.2;font-weight:500;color:#0d1117;
    cursor:grab;user-select:none;overflow:hidden}
  .chip:hover,.chip-prio:hover{outline:2px solid rgba(255,255,255,.5)}
  .chip.dragging,.chip-prio.dragging{opacity:.4}
  .chip.cont,.chip-prio.cont{opacity:.85;border-radius:0;margin-left:-3px;margin-right:-3px;padding-left:6px}
  .chip.cont .pbar,.chip-prio.cont .pbar{display:none}
  .chip .pbar,.chip-prio .pbar{position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:4px 0 0 4px}
  .chip .prio,.chip-prio .prio{display:inline-block;width:7px;height:7px;border-radius:50%;
    margin-right:4px;vertical-align:0;box-shadow:0 0 0 1px rgba(0,0,0,.25)}
  .chip .cname,.chip-prio .cname{font-weight:600;pointer-events:none}
  .chip small,.chip-prio small{display:block;font-size:9px;opacity:.72;font-weight:600;pointer-events:none}
  .chip .grip,.chip-prio .grip{position:absolute;top:0;bottom:0;width:13px;cursor:ew-resize;z-index:3;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.20);opacity:.6;transition:opacity .12s,background .12s}
  .chip .grip::before,.chip-prio .grip::before{content:"";width:2px;height:55%;background:#0d1117;opacity:.55;
    box-shadow:3px 0 0 #0d1117,-3px 0 0 #0d1117}
  .chip .grip.l,.chip-prio .grip.l{left:0;border-radius:5px 0 0 5px}
  .chip .grip.r,.chip-prio .grip.r{right:0;border-radius:0 5px 5px 0}
  .chip:hover .grip,.chip-prio:hover .grip{opacity:.95}
  .chip .grip:hover,.chip-prio .grip:hover{background:rgba(255,255,255,.6);opacity:1}
  .chip-prio .pbar{display:none}
  /* Bouton Done */
  .done-btn{position:absolute;right:3px;top:50%;transform:translateY(-50%);
    background:#1a7f37;color:#fff;border:none;border-radius:2px;padding:1px 4px;
    font-size:9px;font-weight:600;cursor:pointer;opacity:0;transition:opacity .15s;z-index:4}
  .done-btn:hover{background:#238636}
  .chip:hover .done-btn,.chip-prio:hover .done-btn{opacity:1}
  .s-working{background:var(--s-working)} .s-done{background:var(--s-done)}
  .s-stuck{background:var(--s-stuck);color:#fff} .s-check{background:var(--s-check)}
  .s-planned{background:var(--s-planned);color:#fff} .s-toplan{background:#2b76e5;color:#fff}
  .s-standby{background:var(--s-standby);color:#fff}
  .s-test{background:var(--s-test);color:#fff} .s-valid{background:var(--s-valid);color:#fff}
  .s-none{background:var(--s-none);color:#cfd6dd}

  /* zone non planifiées */
  .sidebar-right{display:flex;flex:none;position:relative}
  .sidebar-right.collapsed .unplanned{display:none}
  .toggle-sidebar{position:absolute;left:-28px;top:50%;transform:translateY(-50%);
    width:24px;height:48px;background:var(--panel);border:1px solid var(--grid);
    border-right:none;border-radius:6px 0 0 6px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--ink);z-index:5}
  .toggle-sidebar:hover{background:var(--head)}
  .unplanned{width:180px;flex:none;background:var(--panel);border-left:1px solid var(--grid);
    overflow:auto;padding:8px}
  .unplanned h2{font-size:12px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--ink-dim);margin-bottom:8px}
  .unplanned.dragover{outline:2px dashed var(--s-planned);outline-offset:-4px}
  .unplanned .chip,.unplanned .chip-prio{cursor:grab}
  .sort-btns{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}
  .sort-btn{background:var(--head);color:var(--ink-dim);border:1px solid var(--grid);
    border-radius:4px;padding:3px 6px;font-size:10px;cursor:pointer;font-family:var(--font)}
  .sort-btn:hover{background:var(--grid)}
  .sort-btn.active{background:var(--s-planned);color:#fff;border-color:var(--s-planned)}
  .dept-filter{width:100%;margin-bottom:8px;padding:4px 6px;font-size:11px;
    background:var(--head);color:var(--ink);border:1px solid var(--grid);border-radius:4px;
    font-family:var(--font);cursor:pointer}
  .dept-filter:focus{outline:1px solid var(--s-planned)}

  .banner{background:#3a2d10;color:#ffcf7a;font-size:12px;padding:6px 18px;
    border-bottom:1px solid var(--grid);text-align:center}
  .banner.hidden{display:none}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:20;display:none}
  .scrim.open{display:block}
  .panel{position:fixed;top:0;right:0;width:420px;max-width:92vw;height:100%;
    background:var(--panel);border-left:1px solid var(--grid);z-index:21;
    transform:translateX(100%);transition:transform .22s ease;display:flex;flex-direction:column}
  .panel.open{transform:none}
  .panel header{padding:16px 18px;border-bottom:1px solid var(--grid)}
  .panel header .ttl{font-size:17px;font-weight:700;line-height:1.3}
  .panel .close{position:absolute;top:12px;right:14px;background:none;border:none;
    color:var(--ink-dim);font-size:24px;cursor:pointer;line-height:1}
  .panel .body{padding:16px 18px;overflow:auto;flex:1}
  .panel h3{font-size:11px;text-transform:uppercase;letter-spacing:.8px;
    color:var(--ink-dim);margin:18px 0 6px}
  .panel h3:first-child{margin-top:0}
  .panel p,.panel .txt{font-size:13px;line-height:1.5;color:var(--ink);white-space:pre-wrap}
  .panel .none{color:var(--ink-dim);font-style:italic}
  .pill{display:inline-block;font-size:12px;font-weight:600;padding:3px 9px;border-radius:20px;color:#fff}
  .files a{display:block;font-size:13px;color:var(--s-planned);text-decoration:none;
    padding:6px 0;border-bottom:1px solid var(--grid)}
  .files a:hover{text-decoration:underline}
  .statusgrid{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .statusgrid button{border:none;border-radius:5px;padding:6px 10px;font-size:12px;
    font-weight:600;cursor:pointer;color:#0d1117;font-family:var(--font)}
  .statusgrid button.active{outline:2px solid #fff}
  .statusgrid button:disabled{opacity:.5;cursor:wait}
  .openlink{display:inline-block;margin-top:6px;background:var(--head);color:var(--ink);
    border:1px solid var(--grid);border-radius:6px;padding:8px 14px;font-size:13px;text-decoration:none}
  .openlink:hover{background:var(--grid)}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:#1b222b;border:1px solid var(--grid);color:var(--ink);
    padding:10px 18px;border-radius:8px;font-size:13px;z-index:30;opacity:0;
    transition:opacity .2s;pointer-events:none}
  .toast.show{opacity:1}

  /* Create task modal */
  .create-modal{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
    background:var(--panel);border:1px solid var(--grid);border-radius:10px;
    padding:20px 24px;z-index:25;min-width:320px;max-width:90vw;
    box-shadow:0 10px 40px rgba(0,0,0,.6);display:none}
  .create-modal.open{display:block}
  .create-modal h2{font-size:16px;font-weight:700;margin-bottom:16px;color:var(--ink)}
  .create-modal .form-row{margin-bottom:12px}
  .create-modal label{display:block;font-size:11px;text-transform:uppercase;
    color:var(--ink-dim);margin-bottom:4px;letter-spacing:.5px}
  .create-modal input[type="text"],.create-modal select{width:100%;padding:8px 10px;
    font-size:13px;background:var(--head);color:var(--ink);border:1px solid var(--grid);
    border-radius:5px;font-family:var(--font)}
  .create-modal input[type="text"]:focus,.create-modal select:focus{outline:1px solid var(--s-planned);border-color:var(--s-planned)}
  .create-modal .form-info{font-size:12px;color:var(--ink-dim);margin-bottom:12px}
  .create-modal .form-actions{display:flex;gap:10px;margin-top:18px}
  .create-modal .btn{flex:1;padding:10px;font-size:13px;font-weight:600;border:none;
    border-radius:6px;cursor:pointer;font-family:var(--font)}
  .create-modal .btn-cancel{background:var(--head);color:var(--ink);border:1px solid var(--grid)}
  .create-modal .btn-cancel:hover{background:var(--grid)}
  .create-modal .btn-create{background:var(--s-planned);color:#fff}
  .create-modal .btn-create:hover{background:#4a8ae8}
  .create-modal .btn-create:disabled{opacity:.5;cursor:wait}
</style>
</head>
<body>
  <div class="topbar">
    <h1>Workload</h1>
    <div class="legend" id="legend"></div>
    <div class="controls">
      <label class="zoom-control"><span>Zoom</span><input type="range" id="zoom-slider" min="40" max="100" value="100"><span id="zoom-value">100%</span></label>
      <button id="prev">‹ Sem.</button>
      <button id="today-btn">Today</button>
      <button id="next">Sem. ›</button>
      <div class="meta" id="meta">—</div>
    </div>
  </div>
  <div class="banner" id="banner">Demo mode — sample data. Set the Worker URL to load real tasks.</div>
  <div class="layout">
    <div class="wrap"><table id="grid"></table></div>
    <div class="sidebar-right" id="sidebar-right">
      <button class="toggle-sidebar" id="toggle-sidebar" title="Hide/Show panel">◀</button>
      <div class="unplanned" id="unplanned">
        <h2>Backlog</h2>
        <select class="dept-filter" id="backlog-dept-filter">
          <option value="">All depts</option>
          <option value="Platform">Platform</option>
          <option value="Hydraulics">Hydraulics</option>
          <option value="Rigging">Rigging</option>
          <option value="Appendages">Appendages</option>
        </select>
        <select class="dept-filter" id="backlog-status-filter">
          <option value="">All statuses</option>
          <option value="To be planned">To be planned</option>
          <option value="Planned">Planned</option>
          <option value="Working on it">Working on it</option>
          <option value="To be checked">To be checked</option>
          <option value="Testing & Validation">Testing & Validation</option>
          <option value="Sailors validation">Sailors validation</option>
          <option value="Stuck">Stuck</option>
          <option value="Standby">Standby</option>
        </select>
        <div class="sort-btns" id="sort-btns">
          <button class="sort-btn active" data-sort="priority">Priority</button>
          <button class="sort-btn" data-sort="status">Status</button>
          <button class="sort-btn" data-sort="dept">Dept</button>
          <button class="sort-btn" data-sort="date">Date</button>
        </div>
        <div id="unplanned-list"></div>
      </div>
    </div>
  </div>

  <div class="scrim" id="scrim"></div>
  <aside class="panel" id="panel">
    <button class="close" id="close">×</button>
    <header><div class="ttl" id="p-title"></div></header>
    <div class="body" id="p-body"></div>
  </aside>
  <div class="toast" id="toast"></div>

  <!-- Create task modal -->
  <div class="create-modal" id="create-modal">
    <h2>New Task</h2>
    <div class="form-info" id="create-info"></div>
    <div class="form-row">
      <label>Task name</label>
      <input type="text" id="create-name" placeholder="Enter task name...">
    </div>
    <div class="form-row">
      <label>Department</label>
      <select id="create-dept">
        <option value="">— Select —</option>
        <option value="Platform">Platform</option>
        <option value="Hydraulics">Hydraulics</option>
        <option value="Rigging">Rigging</option>
        <option value="Appendages">Appendages</option>
      </select>
    </div>
    <div class="form-row">
      <label>Status</label>
      <select id="create-status">
        <option value="To be planned">To be planned</option>
        <option value="Planned">Planned</option>
        <option value="Working on it">Working on it</option>
        <option value="To be checked">To be checked</option>
        <option value="Testing & Validation">Testing & Validation</option>
        <option value="Sailors validation">Sailors validation</option>
        <option value="Stuck">Stuck</option>
        <option value="Standby">Standby</option>
      </select>
    </div>
    <div class="form-row">
      <label>Priority</label>
      <select id="create-priority">
        <option value="Not specified">Not specified</option>
        <option value="Before docking out">Before docking out</option>
        <option value="Before next sailing">Before next sailing</option>
        <option value="When possible">When possible</option>
        <option value="Nice to have">Nice to have</option>
      </select>
    </div>
    <div class="form-actions">
      <button class="btn btn-cancel" id="create-cancel">Cancel</button>
      <button class="btn btn-create" id="create-submit">Create</button>
    </div>
  </div>

<script>
/* ===================== CONFIG ===================== */
const CONFIG={
  boardId:5098586993,
  startHourCol:"hour_mm4d7vv5",
  endHourCol:"hour_mm4dj37r",
  // créneaux demi-journée
  AM:{start:"08:00",end:"12:00"},
  PM:{start:"13:00",end:"17:00"},
    people:[
    {label:"Antoine B",  ids:["101235282"], match:["Antoine Ballot"], daysOff:[]},
    {label:"Mathieu P",  ids:["104764134"], match:["Mathieu Perramant"], daysOff:[]},
    {label:"Kevin L",    ids:["104764538"], match:["Kevin Le Guelvoud","kevin.leguelvoud@kc-lab.fr"], daysOff:[]},
    {label:"Philippe E", ids:["104763862"], match:["Philippe Echassoux","philippe echassoux"], daysOff:[]},
    {label:"Fons D",     ids:["104765010"], match:["Fons Dorrestijn","Fonz"], daysOff:[]},
    {label:"Antoine R",  ids:["44355583"],  match:["Antoine Rucard"], daysOff:[]},
    {label:"Germain R",  ids:["100629130"], match:["Germain Rucard"], daysOff:[]},
    {label:"Jan C",      ids:["56054463"],  match:["Jan Chudzik"], daysOff:[]},
    {label:"Simon B",    ids:["104844013"], match:["Simon Bird"], daysOff:[]},
    {label:"Ben T",      ids:["47130240"],  match:["Ben Tapper"], daysOff:[]},
    {label:"Ludovic B",  ids:["101234917"], match:["Ludovic Bosser","ludo.bosser@gmail.com"], daysOff:[]},
    {label:"Jean-Luc L", ids:["104791763"], match:["Jean-Luc Lacaze","Jean-Luc.Lacaze@kc-lab.fr"], daysOff:[]},
    {label:"Fred L",     ids:["104842886"], match:["Fred Le Gouallec","fred.legouallec@kc-lab.fr"], daysOff:[]}
  ],
  workerUrl:"https://kc-monday.charles-dorange.workers.dev",
  refreshMs:5*60*1000
};
const STATUS_CLASS={"Working on it":"s-working","Done":"s-done","Stuck":"s-stuck",
  "To be checked":"s-check","Planned":"s-planned","To be planned":"s-toplan","Standby":"s-standby",
  "Testing & Validation":"s-test","Sailors validation":"s-valid",
  "Waiting For Approval":"s-valid","Aborted":"s-none","Duplicated task":"s-none"};
const STATUS_OPTIONS=["Working on it","Planned","To be planned","To be checked","Testing & Validation",
  "Sailors validation","Done","Stuck","Standby","Aborted"];
const PRIO={
  "Before docking out":["BDO","var(--p-dock)"],"Before Dock Out":["BDO","var(--p-dock)"],
  "Before next sailing":["BNS","var(--p-sail)"],"Before next Sailing":["BNS","var(--p-sail)"],
  "When possible":["WP","var(--p-when)"],
  "Nice to have":["NTH","var(--p-nice)"],
  "Not specified":["NS","var(--p-hold)"]
};
const statusColor=s=>getComputedStyle(document.documentElement)
  .getPropertyValue("--"+((STATUS_CLASS[s])||"s-none")).trim()||"#3a4450";

/* ===================== DATES / SLOTS ===================== */
const DOW=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
const fmtDay=d=>d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short"});
const iso=d=>{const z=new Date(d);z.setMinutes(z.getMinutes()-z.getTimezoneOffset());return z.toISOString().slice(0,10);};
function mondayOf(date){const d=new Date(date);const k=(d.getDay()+6)%7;
  d.setDate(d.getDate()-k);d.setHours(0,0,0,0);return d;}
function weekDays(m){return Array.from({length:7},(_,i)=>{const d=new Date(m);d.setDate(d.getDate()+i);return d;});}
function addDays(isoStr,n){const d=new Date(isoStr+"T00:00:00");d.setDate(d.getDate()+n);return iso(d);}
// un "slot" = {date:"YYYY-MM-DD", half:"AM"|"PM"} ; on le sérialise en index pour comparer
function slotKey(dateIso,half){return dateIso+"#"+half;}
// liste ordonnée des slots entre (startDate,startHalf) et (endDate,endHalf) inclus
function slotsBetween(sd,sh,ed,eh){
  const out=[];let d=sd,h=sh;
  let guard=0;
  while(guard++<400){
    out.push({date:d,half:h});
    if(d===ed&&h===eh)break;
    if(h==="AM"){h="PM";}else{h="AM";d=addDays(d,1);}
  }
  return out;
}
// déduit le créneau de début/fin d'une tâche depuis ses heures Monday
function halfFromHour(hhmm,isStart){
  if(!hhmm) return isStart?"AM":"PM"; // défaut : journée complète
  const h=parseInt(hhmm.split(":")[0],10);
  return h<12.5?"AM":"PM";
}

/* ===================== ÉTAT ===================== */
let weekStart=mondayOf(new Date());
let ITEMS=[];     // tâches normalisées planifiées (1 par personne)
let UNPLANNED=[]; // tâches sans date ou sans personne
let RAW={},usingDemo=false,refreshTimer=null,dragLock=false;
let backlogSort="priority"; // priority | status | dept | date
let backlogDeptFilter="";
let backlogStatusFilter="";
const PRIO_ORDER=["before docking out","before dock out","before next sailing","when possible","nice to have","not specified",""];

/* ===================== INDEX PERSONNES ===================== */
const ID_INDEX={},NAME_INDEX={},LABEL_TO_IDS={},DEFAULT_DAYS_OFF={},DAYS_OFF_WEEKLY={};
// Jours : 0=Dim, 1=Lun, 2=Mar, 3=Mer, 4=Jeu, 5=Ven, 6=Sam
for(const p of CONFIG.people){
  (p.ids||[]).forEach(id=>ID_INDEX[String(id)]=p.label);
  (p.match||[]).forEach(m=>NAME_INDEX[String(m).trim().toLowerCase()]=p.label);
  NAME_INDEX[p.label.trim().toLowerCase()]=p.label;
  LABEL_TO_IDS[p.label]=p.ids||[];
  DEFAULT_DAYS_OFF[p.label]=new Set(p.daysOff||[]); // default: no days off
  DAYS_OFF_WEEKLY[p.label]={}; // {weekKey: Set} - overrides per week
}
// Load days off from localStorage
try{
  const saved=localStorage.getItem("daysOffWeekly");
  if(saved){
    const parsed=JSON.parse(saved);
    for(const person in parsed){
      if(!DAYS_OFF_WEEKLY[person])DAYS_OFF_WEEKLY[person]={};
      for(const weekKey in parsed[person]){
        DAYS_OFF_WEEKLY[person][weekKey]=new Set(parsed[person][weekKey]);
      }
    }
  }
}catch(e){console.warn("Failed to load days off:",e);}
// Save days off to localStorage
function saveDaysOff(){
  const toSave={};
  for(const person in DAYS_OFF_WEEKLY){
    toSave[person]={};
    for(const weekKey in DAYS_OFF_WEEKLY[person]){
      toSave[person][weekKey]=[...DAYS_OFF_WEEKLY[person][weekKey]];
    }
  }
  try{localStorage.setItem("daysOffWeekly",JSON.stringify(toSave));}catch(e){}
}
// Get days off for a person and week
function getDaysOff(person,weekMonday){
  const weekKey=iso(weekMonday);
  if(DAYS_OFF_WEEKLY[person]&&DAYS_OFF_WEEKLY[person][weekKey]){
    return DAYS_OFF_WEEKLY[person][weekKey];
  }
  return DEFAULT_DAYS_OFF[person]||new Set();
}
// Set days off for a person and week
function setDaysOff(person,weekMonday,daysSet){
  const weekKey=iso(weekMonday);
  if(!DAYS_OFF_WEEKLY[person])DAYS_OFF_WEEKLY[person]={};
  DAYS_OFF_WEEKLY[person][weekKey]=daysSet;
  saveDaysOff();
}
const resolveById=id=>ID_INDEX[String(id)]||null;
const resolvePerson=raw=>raw?(NAME_INDEX[String(raw).trim().toLowerCase()]||null):null;
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ===================== LOCAL EVENTS (non sync Monday) ===================== */
let LOCAL_EVENTS=[];
let localEventIdCounter=Date.now();
try{
  const saved=localStorage.getItem("localEvents");
  if(saved){
    LOCAL_EVENTS=JSON.parse(saved);
    // Récupère le plus grand ID pour éviter les doublons
    LOCAL_EVENTS.forEach(e=>{if(Number(e.id)>=localEventIdCounter)localEventIdCounter=Number(e.id)+1;});
  }
}catch(e){console.warn("Failed to load local events:",e);}
function saveLocalEvents(){
  try{localStorage.setItem("localEvents",JSON.stringify(LOCAL_EVENTS));}catch(e){}
}
function addLocalEvent(task){
  LOCAL_EVENTS.push(task);
  saveLocalEvents();
}
function removeLocalEvent(id){
  LOCAL_EVENTS=LOCAL_EVENTS.filter(e=>String(e.id)!==String(id));
  saveLocalEvents();
}
function updateLocalEvent(id,updates){
  const ev=LOCAL_EVENTS.find(e=>String(e.id)===String(id));
  if(ev)Object.assign(ev,updates);
  saveLocalEvents();
}

/* ===================== NORMALISATION API ===================== */
function normalize(apiItems){
  const planned=[],unplanned=[];RAW={};
  for(const it of apiItems){
    const cv=it.column_values||{};
    const get=k=>{const v=cv[k];return v==null?"":(typeof v==="string"?v:(v.text||""));};
    const personText=get("person");
    const personIds=it.person_ids||[];
    const status=get("status")||null,priority=get("priority")||null;
    const startHour=it.start_hour||"",endHour=it.end_hour||"";
    let start=null,end=null;
    const tl=get("timeline");
    if(tl&&tl.includes(" - ")){[start,end]=tl.split(" - ");}
    if(!start){const d=get("date0__1");if(d){start=d;end=d;}}
    const files=(it.files||[]).map(f=>({name:f.name,url:f.public_url||f.url}));
    RAW[it.id]={description:get("description"),how:get("how_we_fixed_it_"),files,url:it.url};
    // résolution personnes
    let labels=personIds.map(resolveById).filter(Boolean);
    if(!labels.length) labels=personText.split(",").map(s=>resolvePerson(s.trim())).filter(Boolean);
    labels=[...new Set(labels)];
    const dept=get("label")||get("color_mm4dwak2")||"";
    const base={id:it.id,name:it.name,status,priority,department:dept,url:it.url,files,
      description:get("description"),how:get("how_we_fixed_it_"),
      startHour,endHour};
    if(start){
      // tâche datée : va dans la grille. Avec personne(s) -> une ligne chacune ;
      // sans personne -> ligne virtuelle "Non attribué" (person:null).
      const startHalf=halfFromHour(startHour,true);
      const endHalf=halfFromHour(endHour,false);
      if(labels.length){
        for(const p of labels)
          planned.push({...base,person:p,start,end:end||start,startHalf,endHalf});
      }else{
        planned.push({...base,person:null,start,end:end||start,startHalf,endHalf});
      }
    }else{
      // pas de date du tout -> backlog "Non planifiées"
      unplanned.push({...base,person:labels[0]||null});
    }
  }
  return {planned,unplanned};
}

/* ===================== CHARGEMENT ===================== */
async function load(){
  if(dragLock) return; // ne pas recharger pendant un geste
  if(CONFIG.workerUrl){
    try{
      const r=await fetch(CONFIG.workerUrl+"/platform",{cache:"no-store"});
      if(!r.ok)throw new Error(r.status);
      const data=await r.json();
      const n=normalize(data.items||data);
      ITEMS=n.planned;UNPLANNED=n.unplanned;usingDemo=false;
    }catch(e){console.warn("Worker KO -> démo:",e);ITEMS=demoItems();UNPLANNED=demoUnplanned();usingDemo=true;}
  }else{ITEMS=demoItems();UNPLANNED=demoUnplanned();usingDemo=true;}
  // Ajoute les événements locaux (non sync Monday)
  LOCAL_EVENTS.forEach(ev=>{
    if(!ITEMS.find(x=>String(x.id)===String(ev.id))){
      ITEMS.push({...ev});
    }
  });
  document.getElementById("banner").classList.toggle("hidden",!usingDemo);
  render();
}

/* ===================== RENDU ===================== */
function statusClass(s){return STATUS_CLASS[s]||"s-none";}
const UNASSIGNED="◇ Event"; // virtual row at bottom of grid
function peopleRows(){return CONFIG.people.map(p=>p.label).concat([UNASSIGNED]);}
// clé de ligne pour une tâche (null -> ligne non attribué)
function rowKeyOf(person){return person||UNASSIGNED;}

function sortUnplanned(list){
  const cpy=[...list];
  if(backlogSort==="priority"){
    cpy.sort((a,b)=>{
      const ai=PRIO_ORDER.indexOf((a.priority||"").toLowerCase());
      const bi=PRIO_ORDER.indexOf((b.priority||"").toLowerCase());
      return (ai<0?99:ai)-(bi<0?99:bi);
    });
  }else if(backlogSort==="status"){
    cpy.sort((a,b)=>(a.status||"").localeCompare(b.status||""));
  }else if(backlogSort==="dept"){
    cpy.sort((a,b)=>(a.department||"").localeCompare(b.department||""));
  }else if(backlogSort==="date"){
    cpy.sort((a,b)=>Number(b.id)-Number(a.id)); // id plus grand = plus récent
  }
  return cpy;
}

function chipHTML(t,opts){
  opts=opts||{};
  const pc=PRIO[t.priority]?PRIO[t.priority][1]:"#d0d0d0";
  const isScheduled=!!t.start;
  const grips=(opts.gripL?`<span class="grip l" data-grip="l"></span>`:"")
            +(opts.gripR?`<span class="grip r" data-grip="r"></span>`:"");
  // Bouton Done visible seulement si planifié et pas en continuation
  const doneBtn=(isScheduled && !opts.cont)?`<button class="done-btn" data-done="${t.id}">Archive</button>`:"";
  // Couleur toujours basée sur la priorité
  const textColor=["var(--p-sail)","var(--p-when)","var(--p-nice)"].includes(pc)?"color:#0d1117;":"";
  const prioStyle=`style="background:${pc};${textColor}"`;
  return `<span class="chip-prio${opts.cont?' cont':''}" ${prioStyle} draggable="true"
    data-id="${t.id}" title="${esc(t.name)} — ${esc(t.priority||'')}">
    ${grips}${doneBtn}<span class="cname">${esc(t.name)}</span>`+
    (t.status?`<small>${esc(t.status)}</small>`:"")+`</span>`;
}

// Calcule les tracks (pistes) pour éviter le "saut" visuel des tâches
function computeTracks(tasks){
  if(!tasks.length)return {};
  // Trie par date de début
  const sorted=[...tasks].sort((a,b)=>{
    const aIdx=slotIndex({date:a.start,half:a.startHalf||"AM"});
    const bIdx=slotIndex({date:b.start,half:b.startHalf||"AM"});
    return aIdx-bIdx;
  });
  const trackEnds=[]; // Pour chaque track, l'index du dernier slot occupé
  const taskTracks={}; // Map task.id -> numéro de track
  for(const task of sorted){
    const taskStart=slotIndex({date:task.start,half:task.startHalf||"AM"});
    const taskEnd=slotIndex({date:task.end||task.start,half:task.endHalf||"PM"});
    // Cherche la première track libre
    let foundTrack=-1;
    for(let i=0;i<trackEnds.length;i++){
      if(taskStart>trackEnds[i]){foundTrack=i;break;}
    }
    if(foundTrack===-1){
      foundTrack=trackEnds.length;
      trackEnds.push(taskEnd);
    }else{
      trackEnds[foundTrack]=taskEnd;
    }
    taskTracks[task.id]=foundTrack;
  }
  return taskTracks;
}

function render(){
  const days=weekDays(weekStart),dayIso=days.map(iso),todayIso=iso(new Date());
  const rows=peopleRows();

  // Calcule les tracks par personne
  const tracksByPerson={};
  for(const person of rows){
    const personTasks=ITEMS.filter(it=>rowKeyOf(it.person)===person&&it.start);
    tracksByPerson[person]=computeTracks(personTasks);
  }

  // index : personne -> slotKey -> [{task,isStart,track}]
  const byCell={};
  for(const it of ITEMS){
    if(!it.start)continue;
    const row=rowKeyOf(it.person);
    const track=tracksByPerson[row]?.[it.id]||0;
    const slots=slotsBetween(it.start,it.startHalf||"AM",it.end||it.start,it.endHalf||"PM");
    slots.forEach((s,i)=>{
      const key=row+"||"+slotKey(s.date,s.half);
      (byCell[key]=byCell[key]||[]).push({task:it,isStart:i===0,isEnd:i===slots.length-1,track});
    });
  }
  // entête : 2 niveaux (jour, puis AM/PM)
  let html="<thead><tr><th class='namecol' rowspan='2'>Name</th>";
  days.forEach((d,i)=>{const we=i>=5,td=dayIso[i]===todayIso;
    html+=`<th colspan="2" class="day-col ${we?'weekend':''} ${td?'today':''}">${DOW[i]}<span class="dow">${fmtDay(d)}</span></th>`;});
  html+="</tr><tr>";
  days.forEach((d,i)=>{const we=i>=5,td=dayIso[i]===todayIso;
    html+=`<th class="ampm am ${we?'weekend':''} ${td?'today':''}">AM</th><th class="ampm ${we?'weekend':''} ${td?'today':''}">PM</th>`;});
  html+="</tr></thead><tbody>";
  for(const person of rows){
    const isUnassigned=(person===UNASSIGNED);
    const personDaysOff=getDaysOff(person,weekStart);
    html+=`<tr${isUnassigned?' class="row-unassigned"':''}><td class="name" data-person="${esc(person)}"${isUnassigned?' style="color:var(--s-planned);font-style:italic;cursor:default"':''}>${esc(person)}</td>`;
    days.forEach((d,i)=>{
      // i: 0=Lun, 1=Mar, ... 6=Dim dans notre affichage
      // Convertir en jour JS: Lun=1, Mar=2, ... Dim=0
      const jsDow=(i+1)%7; // 0=Lun->1, 6=Dim->0
      const isDayOff=personDaysOff.has(jsDow);
      const isSat=i===5,isSun=i===6,we=isSat||isSun,td=dayIso[i]===todayIso;
      ["AM","PM"].forEach(half=>{
        const cellTasks=byCell[person+"||"+slotKey(dayIso[i],half)]||[];
        // Trie par track pour un affichage stable
        cellTasks.sort((a,b)=>a.track-b.track);
        let inner="";
        // N'affiche pas les chips si c'est un jour off pour cette personne
        if(!isDayOff){
          for(const ct of cellTasks)
            inner+=chipHTML(ct.task,{cont:!ct.isStart,gripL:ct.isStart,gripR:ct.isEnd});
        }
        html+=`<td class="slot ${half==='AM'?'am':'pm'} ${we?'weekend':''} ${td?'today':''} ${isDayOff?'day-off':''}"
          data-person="${esc(person)}" data-date="${dayIso[i]}" data-half="${half}">${inner}</td>`;
      });
    });
    html+="</tr>";
  }
  html+="</tbody>";
  document.getElementById("grid").innerHTML=html;

  // Backlog : toutes les tâches non planifiées sauf Aborted
  let filtered=UNPLANNED.filter(t=>t.status!=="Aborted");
  // Filtres département et statut
  if(backlogDeptFilter) filtered=filtered.filter(t=>t.department===backlogDeptFilter);
  if(backlogStatusFilter) filtered=filtered.filter(t=>t.status===backlogStatusFilter);
  const sorted=sortUnplanned(filtered);
  document.getElementById("unplanned-list").innerHTML=
    sorted.map(t=>chipHTML(t,{})).join("")||'<p style="font-size:10px;color:var(--ink-dim)">No tasks</p>';
  // Event listeners filtres
  document.getElementById("backlog-dept-filter").value=backlogDeptFilter;
  document.getElementById("backlog-dept-filter").onchange=e=>{backlogDeptFilter=e.target.value;render();};
  document.getElementById("backlog-status-filter").value=backlogStatusFilter;
  document.getElementById("backlog-status-filter").onchange=e=>{backlogStatusFilter=e.target.value;render();};
  // boutons tri
  document.querySelectorAll(".sort-btn").forEach(b=>{
    b.classList.toggle("active",b.dataset.sort===backlogSort);
    b.onclick=()=>{backlogSort=b.dataset.sort;render();};
  });

  document.getElementById("meta").textContent=
    (usingDemo?"DEMO · ":"")+"Updated "+new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});

  bindChipClicks();
  bindDnD();
  bindDaysOffPopup();
  bindCellClick();
  adjustRowHeights();
}

/* ---- Zoom manuel ---- */
function applyZoom(){
  const table=document.getElementById("grid");
  const slider=document.getElementById("zoom-slider");
  const label=document.getElementById("zoom-value");
  const wrap=document.querySelector(".wrap");
  if(!table||!slider)return;
  const zoom=parseInt(slider.value,10)/100;
  table.style.zoom=String(zoom);
  if(label)label.textContent=slider.value+"%";
  if(wrap)wrap.style.overflow="auto";
}
function adjustRowHeights(){applyZoom();}
document.getElementById("zoom-slider").addEventListener("input",applyZoom);
window.addEventListener("resize",()=>adjustRowHeights());

/* ---- Popup jours off ---- */
let currentPopup=null;
function closeDaysOffPopup(e){
  if(currentPopup){
    if(e&&currentPopup.contains(e.target))return; // clic dans le popup
    currentPopup.remove();currentPopup=null;
    document.removeEventListener("click",closeDaysOffPopup);
    render(); // re-render pour appliquer les changements
  }
}
function bindDaysOffPopup(){
  document.querySelectorAll("td.name[data-person]").forEach(td=>{
    if(td.dataset.person===UNASSIGNED)return;
    td.onclick=e=>{
      e.stopPropagation();
      if(currentPopup){closeDaysOffPopup();return;}
      const person=td.dataset.person;
      const daysOff=getDaysOff(person,weekStart);
      const popup=document.createElement("div");
      popup.className="days-off-popup";
      const dayNames=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
      const weekLabel=`${iso(weekStart).slice(5)}`;
      popup.innerHTML=`<div class="popup-title">Days off — ${person}<br><small style="opacity:.7">Week of ${weekLabel}</small></div>`+
        dayNames.map((name,idx)=>{
          const isOff=daysOff.has(idx);
          return `<label class="${isOff?'day-checked':''}">
            <input type="checkbox" data-day="${idx}" ${isOff?'checked':''}>
            <span>${name}</span>
          </label>`;
        }).join("");
      // Position fixe près du clic (vers le haut si pas assez de place en bas)
      document.body.appendChild(popup);
      const rect=td.getBoundingClientRect();
      const popupH=popup.offsetHeight;
      const spaceBelow=window.innerHeight-rect.bottom-10;
      const spaceAbove=rect.top-10;
      if(spaceBelow>=popupH || spaceBelow>=spaceAbove){
        popup.style.top=(rect.bottom+4)+"px";
      }else{
        popup.style.top=(rect.top-popupH-4)+"px";
      }
      popup.style.left=(rect.left)+"px";
      currentPopup=popup;
      // Crée une copie locale pour cette semaine si elle n'existe pas encore
      const weekKey=iso(weekStart);
      if(!DAYS_OFF_WEEKLY[person][weekKey]){
        DAYS_OFF_WEEKLY[person][weekKey]=new Set(daysOff);
      }
      popup.querySelectorAll("input").forEach(cb=>{
        cb.onchange=()=>{
          const day=Number(cb.dataset.day);
          if(cb.checked)DAYS_OFF_WEEKLY[person][weekKey].add(day);
          else DAYS_OFF_WEEKLY[person][weekKey].delete(day);
          saveDaysOff(); // Save to localStorage
          cb.parentElement.classList.toggle("day-checked",cb.checked);
          render();
        };
      });
      // Ferme sur clic ailleurs (avec délai pour éviter fermeture immédiate)
      setTimeout(()=>document.addEventListener("click",closeDaysOffPopup),10);
    };
  });
}

/* ===================== CLIC -> PANNEAU ===================== */
function findTask(id){return ITEMS.find(x=>String(x.id)===String(id))||UNPLANNED.find(x=>String(x.id)===String(id))||LOCAL_EVENTS.find(x=>String(x.id)===String(id));}
function bindChipClicks(){
  document.querySelectorAll(".chip,.chip-prio").forEach(c=>{
    c.addEventListener("click",e=>{
      if(c._wasDragged){c._wasDragged=false;return;}
      if(e.target.classList.contains("grip"))return;
      openPanel(c.dataset.id);
    });
  });
}
let currentId=null;
const PRIO_OPTIONS=["Before docking out","Before next sailing","When possible","Nice to have","Not specified"];
function openPanel(id){
  currentId=id;const it=findTask(id);if(!it)return;
  const isLocal=it.isLocal||String(id).startsWith("local_");
  const det=RAW[id]||{description:it.description,how:it.how,files:it.files,url:it.url};
  document.getElementById("p-title").textContent=it.name;
  const files=(det.files&&det.files.length)
    ?`<div class="files">${det.files.map(f=>`<a href="${esc(f.url)}" target="_blank" rel="noopener">📎 ${esc(f.name)}</a>`).join("")}</div>`
    :'<p class="none">No files</p>';
  const statusBtns=STATUS_OPTIONS.map(s=>{
    const active=(s===it.status)?" active":"";
    const wht=['Stuck','Standby','Testing & Validation','Sailors validation','Planned'].includes(s)?'color:#fff;':'';
    return `<button class="set-status${active}" data-label="${esc(s)}" style="background:${statusColor(s)};${wht}">${esc(s)}</button>`;
  }).join("");
  const prioBtns=PRIO_OPTIONS.map(p=>{
    const active=(p===it.priority||p.toLowerCase()===it.priority?.toLowerCase())?" active":"";
    const col=PRIO[p]?PRIO[p][1]:'#3a4450';
    return `<button class="set-prio${active}" data-label="${esc(p)}" style="background:${col}">${esc(p)}</button>`;
  }).join("");
  const mondaySection=isLocal?'<p class="none">Local event (not synced)</p>'
    :`<a class="openlink" href="${esc(det.url)}" target="_blank" rel="noopener">Open in Monday ↗</a>`;
  document.getElementById("p-body").innerHTML=`
    <h3>Status — click to change</h3><div class="statusgrid">${statusBtns}</div>
    <h3>Priority — click to change</h3><div class="statusgrid">${prioBtns}</div>
    <h3>Description</h3>${det.description?`<div class="txt">${esc(det.description)}</div>`:'<p class="none">—</p>'}
    <h3>How we fixed it?</h3>${det.how?`<div class="txt">${esc(det.how)}</div>`:'<p class="none">—</p>'}
    <h3>Attached files</h3>${files}
    <h3>Monday</h3>${mondaySection}`;
  document.querySelectorAll(".set-status").forEach(b=>b.onclick=()=>changeStatus(b.dataset.label));
  document.querySelectorAll(".set-prio").forEach(b=>b.onclick=()=>changePriority(b.dataset.label));
  document.getElementById("scrim").classList.add("open");
  document.getElementById("panel").classList.add("open");
}
function closePanel(){
  document.getElementById("panel").classList.remove("open");currentId=null;
  // Ne ferme le scrim que si le modal de création n'est pas ouvert
  const cm=document.getElementById("create-modal");
  if(!cm||!cm.classList.contains("open"))document.getElementById("scrim").classList.remove("open");
}
document.getElementById("close").onclick=closePanel;
document.getElementById("scrim").onclick=function(){
  // Ferme le modal de création en priorité, sinon le panneau
  const cm=document.getElementById("create-modal");
  if(cm&&cm.classList.contains("open")){
    cm.classList.remove("open");
    if(!document.getElementById("panel").classList.contains("open"))
      document.getElementById("scrim").classList.remove("open");
  }else closePanel();
};
document.addEventListener("keydown",e=>{
  if(e.key==="Escape"){
    const cm=document.getElementById("create-modal");
    if(cm&&cm.classList.contains("open")){
      cm.classList.remove("open");
      if(!document.getElementById("panel").classList.contains("open"))
        document.getElementById("scrim").classList.remove("open");
    }else closePanel();
  }
});

/* ===================== BOUTON DONE ===================== */
document.addEventListener("click",async e=>{
  const btn=e.target.closest(".done-btn");
  if(!btn)return;
  e.stopPropagation();e.preventDefault();
  const id=btn.dataset.done;
  const it=findTask(id);
  if(!it)return;
  // Confirmation
  if(!confirm(`Archive "${it.name}"?`))return;
  // Local Event — pas de sync
  if(it.isLocal||String(id).startsWith("local_")){
    removeLocalEvent(id);
    ITEMS=ITEMS.filter(x=>String(x.id)!==String(id));
    render();toast("Event archived");
    return;
  }
  // Mode démo
  if(usingDemo){
    ITEMS=ITEMS.filter(x=>x.id!==id);
    render();toast("Demo: task archived");
    return;
  }
  // Appel API
  btn.disabled=true;btn.textContent="...";
  try{
    const r=await fetch(CONFIG.workerUrl+"/status",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({itemId:Number(id),label:"Done"})});
    if(!r.ok)throw new Error(await r.text());
    // Succès : retirer la tâche du dashboard
    ITEMS=ITEMS.filter(x=>x.id!==id);
    UNPLANNED=UNPLANNED.filter(x=>x.id!==id);
    render();toast("Task archived ✓");
  }catch(err){
    console.error("Done error:",err);
    toast("Error: "+err.message);
    btn.disabled=false;btn.textContent="Archive";
  }
});

/* ===================== CHANGER STATUT ===================== */
async function changeStatus(label){
  if(!currentId)return;const it=findTask(currentId);
  const isLocal=it&&(it.isLocal||String(it.id).startsWith("local_"));
  // Local Event — update localStorage
  if(isLocal){
    if(it)it.status=label;
    updateLocalEvent(currentId,{status:label});
    render();reopenIfActive(label);toast("Status: « "+label+" »");return;
  }
  if(usingDemo){if(it)it.status=label;render();reopenIfActive(label);toast("Demo: status « "+label+" »");return;}
  const btns=document.querySelectorAll(".set-status");btns.forEach(b=>b.disabled=true);
  try{
    const r=await fetch(CONFIG.workerUrl+"/status",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({itemId:Number(currentId),label})});
    if(!r.ok)throw new Error(await r.text());
    if(it)it.status=label;render();reopenIfActive(label);toast("Status: « "+label+" »");
  }catch(e){console.error(e);toast("Failed to update status.");}
  finally{document.querySelectorAll(".set-status").forEach(b=>b.disabled=false);}
}
function reopenIfActive(label){
  document.querySelectorAll(".set-status").forEach(b=>b.classList.toggle("active",b.dataset.label===label));
}

/* ===================== CRÉATION DE TÂCHE ===================== */
let createContext=null; // {person, date, half}
const createModal=document.getElementById("create-modal");
const createInfo=document.getElementById("create-info");
const createName=document.getElementById("create-name");
const createDept=document.getElementById("create-dept");
const createStatus=document.getElementById("create-status");
const createPriority=document.getElementById("create-priority");
const createCancel=document.getElementById("create-cancel");
const createSubmit=document.getElementById("create-submit");

function openCreateModal(person,date,half){
  createContext={person,date,half};
  const dayLabel=new Date(date+"T00:00:00").toLocaleDateString("en-US",{weekday:"short",day:"numeric",month:"short"});
  createInfo.innerHTML=`<strong>${person}</strong> — ${dayLabel} ${half}`;
  createName.value="";
  createDept.value="Platform";
  createStatus.value="To be planned";
  createPriority.value="Not specified";
  createModal.classList.add("open");
  document.getElementById("scrim").classList.add("open");
  setTimeout(()=>createName.focus(),50);
}
function closeCreateModal(){
  createModal.classList.remove("open");
  createContext=null;
  // Ne ferme le scrim que si le panneau de détail n'est pas ouvert
  if(!document.getElementById("panel").classList.contains("open"))document.getElementById("scrim").classList.remove("open");
}
createCancel.onclick=closeCreateModal;

createSubmit.onclick=async function(){
  const name=createName.value.trim();
  if(!name){toast("Please enter a task name");createName.focus();return;}
  const ctx=createContext;if(!ctx)return;
  const isEvent=(ctx.person===UNASSIGNED);
  const dept=createDept.value;
  const status=createStatus.value;
  const priority=createPriority.value;

  createSubmit.disabled=true;createSubmit.textContent="Creating...";

  if(isEvent){
    // Local Event — pas de sync Monday
    const id="local_"+(localEventIdCounter++);
    const task={
      id,name,person:UNASSIGNED,
      start:ctx.date,startHalf:ctx.half,end:ctx.date,endHalf:ctx.half,
      status,priority,dept,description:"",how:"",files:[],url:"",isLocal:true
    };
    addLocalEvent(task);
    ITEMS.push(task);
    render();toast("Event created (local)");
    closeCreateModal();
  }else{
    // Sync Monday
    if(usingDemo){
      const id="demo_"+(localEventIdCounter++);
      ITEMS.push({
        id,name,person:ctx.person,
        start:ctx.date,startHalf:ctx.half,end:ctx.date,endHalf:ctx.half,
        status,priority,dept,description:"",how:"",files:[],url:""
      });
      render();toast("Demo: task created");
      closeCreateModal();
      createSubmit.disabled=false;createSubmit.textContent="Create";
      return;
    }
    try{
      const personIds=LABEL_TO_IDS[ctx.person]||[];
      const startHour=ctx.half==="AM"?CONFIG.AM.start:CONFIG.PM.start;
      const endHour=ctx.half==="AM"?CONFIG.AM.end:CONFIG.PM.end;
      const r=await fetch(CONFIG.workerUrl+"/create",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          name,dept,status,priority,personIds,
          from:ctx.date,to:ctx.date,startHour,endHour
        })});
      if(!r.ok)throw new Error(await r.text());
      const data=await r.json();
      // Ajoute la tâche localement
      ITEMS.push({
        id:data.id,name,person:ctx.person,
        start:ctx.date,startHalf:ctx.half,end:ctx.date,endHalf:ctx.half,
        status,priority,dept,description:"",how:"",files:[],url:data.url||""
      });
      render();toast("Task created ✓");
      closeCreateModal();
    }catch(e){
      console.error("Create error:",e);
      toast("Error: "+e.message);
    }
  }
  createSubmit.disabled=false;createSubmit.textContent="Create";
};

// Clic sur espace vide d'une cellule = créer tâche
function bindCellClick(){
  document.querySelectorAll("td.slot").forEach(td=>{
    td.addEventListener("click",e=>{
      // Ignore si clic sur une chip
      if(e.target.closest(".chip,.chip-prio"))return;
      // Ignore si jour off
      if(td.classList.contains("day-off"))return;
      const person=td.dataset.person;

      const half=td.dataset.half;
      if(!person||!date||!half)return;

/* ===================== DRAG & DROP ===================== */
let dragState=null; // {id, mode:'move'|'resizeL'|'resizeR'}
let gripPending=null; // temporaire : set par mousedown sur grip, consommé par dragstart
let overflowTarget=null; // {date,half,person} si le curseur dépasse la grille vers la droite

// Nettoie gripPending si on clique sans faire de drag
document.addEventListener("mouseup",()=>{setTimeout(()=>{gripPending=null;},50);});

// Détection dépassement grille (pour resize vers semaine suivante)
document.addEventListener("dragover",e=>{
  if(!dragState||dragState.mode==="move"){overflowTarget=null;return;}
  const grid=document.getElementById("grid");
  const rect=grid.getBoundingClientRect();
  // Vérifie si on est au-delà du bord droit de la grille
  if(e.clientX>rect.right-10){
    // Estime la largeur d'un slot
    const slots=document.querySelectorAll("td.slot");
    if(!slots.length){overflowTarget=null;return;}
    const slotWidth=slots[0].offsetWidth||60;
    const overflow=e.clientX-rect.right+10;
    const slotsOverflow=Math.max(1,Math.ceil(overflow/slotWidth));
    // Dernier jour visible = dimanche de weekStart
    const days=weekDays(weekStart);
    let targetDate=iso(days[6]);
    let targetHalf="PM";
    // Ajoute les slots en overflow
    for(let i=0;i<slotsOverflow;i++){
      if(targetHalf==="AM")targetHalf="PM";
      else{targetHalf="AM";targetDate=addDays(targetDate,1);}
    }
    // Détermine la personne depuis la ligne survolée
    let person=null;
    const row=document.elementFromPoint(e.clientX-overflow-20,e.clientY);
    if(row){
      const td=row.closest("td.name");
      if(td)person=td.textContent.trim();
      else{const slot=row.closest("td.slot");if(slot)person=slot.dataset.person;}
    }
    overflowTarget={date:targetDate,half:targetHalf,person:person||UNASSIGNED};
    // Indicateur visuel
    document.getElementById("meta").textContent="→ "+targetDate+" "+targetHalf;
  }else if(e.clientX<rect.left+10 && dragState.mode==="resizeL"){
    // Dépassement vers la gauche pour resizeL
    const slots=document.querySelectorAll("td.slot");
    if(!slots.length){overflowTarget=null;return;}
    const slotWidth=slots[0].offsetWidth||60;
    const overflow=rect.left-e.clientX+10;
    const slotsOverflow=Math.max(1,Math.ceil(overflow/slotWidth));
    const days=weekDays(weekStart);
    let targetDate=iso(days[0]); // Lundi
    let targetHalf="AM";
    for(let i=0;i<slotsOverflow;i++){
      if(targetHalf==="PM")targetHalf="AM";
      else{targetHalf="PM";targetDate=addDays(targetDate,-1);}
    }
    let person=null;
    const row=document.elementFromPoint(rect.left+30,e.clientY);
    if(row){
      const td=row.closest("td.name");
      if(td)person=td.textContent.trim();
      else{const slot=row.closest("td.slot");if(slot)person=slot.dataset.person;}
    }
    overflowTarget={date:targetDate,half:targetHalf,person:person||UNASSIGNED};
    document.getElementById("meta").textContent="← "+targetDate+" "+targetHalf;
  }else{
    overflowTarget=null;
  }
});

// Délégation d'événements pour le drag & drop (setup une seule fois)
let dndInitialized=false;
function initDnD(){
  if(dndInitialized)return;
  dndInitialized=true;

  // Grip mousedown - délégation sur document
  document.addEventListener("mousedown",e=>{
    const grip=e.target.closest(".grip");
    if(!grip)return;
    const chip=grip.closest(".chip,.chip-prio");
    if(!chip)return;
    gripPending={id:chip.dataset.id,mode:grip.dataset.grip==="l"?"resizeL":"resizeR"};
  });

  // Chip dragstart - délégation sur document
  document.addEventListener("dragstart",e=>{
    const chip=e.target.closest(".chip,.chip-prio");
    if(!chip)return;
    dragLock=true;chip.classList.add("dragging");
    // Récupère le slot d'origine (la cellule où se trouve cette chip)
    const slot=chip.closest("td.slot");
    const grabSlot=slot?{date:slot.dataset.date,half:slot.dataset.half}:null;
    // Détermine le mode : resize si on vient d'un grip, sinon move
    if(gripPending&&gripPending.id===chip.dataset.id){
      dragState={id:chip.dataset.id,mode:gripPending.mode,grabSlot};
    }else{
      dragState={id:chip.dataset.id,mode:"move",grabSlot};
    }
    gripPending=null;
    e.dataTransfer.setData("text/plain",chip.dataset.id);
    e.dataTransfer.effectAllowed="move";
  });

  // Chip dragend - délégation sur document
  document.addEventListener("dragend",e=>{
    const chip=e.target.closest(".chip,.chip-prio");
    if(!chip)return;
    chip.classList.remove("dragging");chip._wasDragged=true;
    setTimeout(()=>{dragLock=false;},200);
    document.querySelectorAll(".dragover").forEach(x=>x.classList.remove("dragover"));
    // Si on a un overflow target (resize au-delà de la grille visible)
    if(dragState&&overflowTarget){
      const id=dragState.id,mode=dragState.mode;
      const it=findTask(id);
      if(it&&it.start){
        // Ajuste pour le weekend (selon si la personne travaille le samedi)
        const adj=adjustForDayOff(overflowTarget.date,overflowTarget.half,it.person);
        // Bascule vers la semaine de la date ajustée
        weekStart=mondayOf(new Date(adj.date+"T00:00:00"));
        if(mode==="resizeR"){
          const s={date:it.start,half:it.startHalf||"AM"};
          const ee={date:adj.date,half:adj.half};
          applySchedule(it,it.person,s,ee);
        }else if(mode==="resizeL"){
          const ee={date:it.end||it.start,half:it.endHalf||"PM"};
          const s={date:adj.date,half:adj.half};
          applySchedule(it,it.person,s,ee);
        }
      }
    }
    dragState=null;overflowTarget=null;gripPending=null;
  });

  // Slot dragover/dragleave/drop - délégation sur la grille
  const grid=document.getElementById("grid");
  grid.addEventListener("dragover",e=>{
    const td=e.target.closest("td.slot");
    if(td){e.preventDefault();td.classList.add("dragover");}
  });
  grid.addEventListener("dragleave",e=>{
    const td=e.target.closest("td.slot");
    if(td)td.classList.remove("dragover");
  });
  grid.addEventListener("drop",e=>{
    const td=e.target.closest("td.slot");
    if(!td)return;
    e.preventDefault();td.classList.remove("dragover");
    onDropSlot(td.dataset.person,td.dataset.date,td.dataset.half);
  });

  // Zone Backlog (non planifiées) -> statut Standby
  const uz=document.getElementById("unplanned");
  uz.addEventListener("dragover",e=>{e.preventDefault();uz.classList.add("dragover");});
  uz.addEventListener("dragleave",()=>uz.classList.remove("dragover"));
  uz.addEventListener("drop",e=>{e.preventDefault();uz.classList.remove("dragover");onDropToBacklog();});

}

function bindDnD(){
  initDnD(); // setup une seule fois
}

// Ajuste la date si elle tombe sur un jour off pour cette personne (semaine courante)
function adjustForDayOff(dateIso,half,person){
  const daysOff=person?getDaysOff(person,weekStart):new Set([0,6]);
  if(!daysOff||daysOff.size===0)return {date:dateIso,half};
  let d=new Date(dateIso+"T00:00:00");
  let attempts=0;
  // Avance jusqu'à trouver un jour travaillé (max 7 jours)
  while(daysOff.has(d.getDay())&&attempts<7){
    d.setDate(d.getDate()+1);
    attempts++;
  }
  if(attempts>0)return {date:iso(d),half:"AM"};
  return {date:dateIso,half};
}

function onDropSlot(person,date,half){
  if(!dragState)return;
  const id=dragState.id,mode=dragState.mode,grabSlot=dragState.grabSlot;
  dragState=null;overflowTarget=null;
  const it=findTask(id);if(!it)return;

  // Détermine la personne pour l'ajustement weekend
  const effectivePerson=(mode==="move")?(person===UNASSIGNED?null:person):it.person;
  // Ajuste pour le weekend
  const adjusted=adjustForDayOff(date,half,effectivePerson);
  date=adjusted.date;half=adjusted.half;

  if(mode==="move"){
    // ligne "Non attribué" -> cible sans personne (targetPerson=null)
    const targetPerson=(person===UNASSIGNED)?null:person;
    let nbSlots=1;
    if(it.start){
      nbSlots=slotsBetween(it.start,it.startHalf||"AM",it.end||it.start,it.endHalf||"PM").length;
    }

    // Calcule l'offset entre le slot attrapé et le début de la tâche
    let offsetSlots=0;
    if(grabSlot&&it.start){
      const taskStartIdx=slotIndex({date:it.start,half:it.startHalf||"AM"});
      const grabIdx=slotIndex(grabSlot);
      offsetSlots=grabIdx-taskStartIdx; // nb de slots entre le début et la chip attrapée
    }

    // Le nouveau début = drop slot - offset
    const dropIdx=slotIndex({date,half});
    const newStartIdx=dropIdx-offsetSlots;
    const newStartSlot=slotFromIndex(newStartIdx);

    // Expand pour obtenir le nouveau end
    const seq=expandSlots(newStartSlot,nbSlots);
    const endSlot=seq[seq.length-1];
    applySchedule(it,targetPerson,newStartSlot,endSlot);
  }else if(mode==="resizeR"){
    if(!it.start)return;
    const s={date:it.start,half:it.startHalf||"AM"};
    const e={date,half};
    if(slotIndex(e)<slotIndex(s)) return;
    applySchedule(it,it.person,s,e);
  }else if(mode==="resizeL"){
    if(!it.start)return;
    const e={date:it.end||it.start,half:it.endHalf||"PM"};
    const s={date,half};
    if(slotIndex(s)>slotIndex(e)) return;
    applySchedule(it,it.person,s,e);
  }
}
function onDropToBacklog(){
  if(!dragState)return;const id=dragState.id;dragState=null;overflowTarget=null;
  const it=findTask(id);if(!it)return;
  // retire la planif et passe en Standby
  applyUnschedule(it,"Standby");
}

// index absolu d'un slot pour comparaisons (jours*2 + AM/PM)
function slotIndex(s){const d=new Date(s.date+"T00:00:00");return Math.round(d.getTime()/86400000)*2+(s.half==="PM"?1:0);}
// inverse de slotIndex : reconvertit un index en {date, half}
function slotFromIndex(idx){
  const daysSinceEpoch=Math.floor(idx/2);
  const d=new Date(daysSinceEpoch*86400000);
  const dateStr=d.toISOString().slice(0,10);
  return {date:dateStr,half:(idx%2===1)?"PM":"AM"};
}
function expandSlots(start,n){
  const out=[];let d=start.date,h=start.half;
  for(let i=0;i<n;i++){out.push({date:d,half:h});if(h==="AM")h="PM";else{h="AM";d=addDays(d,1);}}
  return out;
}

/* ---- applique une nouvelle planif (optimiste + écriture Monday) ----
   person : label technicien, ou null = retirer l'attribution.
   Passer undefined pour "ne pas toucher à la personne" (resize). */
async function applySchedule(it,person,startSlot,endSlot){
  const from=startSlot.date,to=endSlot.date;
  const startHour=startSlot.half==="AM"?CONFIG.AM.start:CONFIG.PM.start;
  const endHour=endSlot.half==="AM"?CONFIG.AM.end:CONFIG.PM.end;
  const snap={...it};
  const touchPerson=(person!==undefined);       // resize -> undefined -> on ne touche pas
  const personChanged=touchPerson && (person!==it.person);
  const isLocal=it.isLocal||String(it.id).startsWith("local_");

  // Auto-statut selon la semaine
  const currentWeekStart=mondayOf(new Date());
  const targetWeekStart=mondayOf(new Date(from+"T00:00:00"));
  const isCurrentWeek=iso(currentWeekStart)===iso(targetWeekStart);
  const newStatus=isCurrentWeek?"Working on it":"Planned";

  // maj optimiste locale
  if(touchPerson) it.person=person;             // peut être null (non attribué)
  it.start=from;it.end=to;
  it.startHalf=startSlot.half;it.endHalf=endSlot.half;
  it.status=newStatus;
  if(UNPLANNED.includes(it)){UNPLANNED=UNPLANNED.filter(x=>x!==it);ITEMS.push(it);}
  render();

  // Local Event — update localStorage only
  if(isLocal){
    updateLocalEvent(it.id,{start:from,end:to,startHalf:startSlot.half,endHalf:endSlot.half,
      person:touchPerson?person:it.person,status:newStatus});
    toast("Event updated");return;
  }

  if(usingDemo){toast(person===null?"Demo: event":"Demo: "+newStatus);return;}
  try{
    const r=await fetch(CONFIG.workerUrl+"/schedule",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({itemId:Number(it.id),from,to,startHour,endHour})});
    if(!r.ok)throw new Error(await r.text());
    // Maj statut auto
    await fetch(CONFIG.workerUrl+"/status",{method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({itemId:Number(it.id),label:newStatus})});
    if(personChanged){
      const ids=(person===null)?[]:(LABEL_TO_IDS[person]||[]);
      const rp=await fetch(CONFIG.workerUrl+"/person",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({itemId:Number(it.id),personIds:ids})});
      if(!rp.ok)throw new Error(await rp.text());
    }
    toast(person===null?"Event — dates kept":"Saved to Monday");
  }catch(e){
    console.error(e);
    Object.assign(it,snap);render();toast("Failed — reverted");
  }
}
async function applyUnschedule(it,newStatus){
  const snap={...it};
  const wasInItems=ITEMS.includes(it);
  const wasInUnplanned=UNPLANNED.includes(it);
  const hadSchedule=!!it.start; // avait une planification ?
  const hadPerson=!!it.person;  // avait une personne ?

  // Retire des deux listes et ajoute dans UNPLANNED
  ITEMS=ITEMS.filter(x=>x!==it);
  UNPLANNED=UNPLANNED.filter(x=>x!==it);
  it.start=null;it.end=null;it.person=null;
  if(newStatus)it.status=newStatus;
  UNPLANNED.push(it);
  render();

  if(usingDemo){toast("Demo: "+newStatus);return;}

  try{
    // Vide la timeline seulement si elle était remplie
    if(hadSchedule){
      const r=await fetch(CONFIG.workerUrl+"/schedule",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({itemId:Number(it.id),from:"",to:""})});
      if(!r.ok){console.error("schedule error:",await r.text());}
    }

    // Met à jour le statut dans Monday
    if(newStatus){
      console.log("Updating status to:",newStatus,"for item:",it.id);
      const rs=await fetch(CONFIG.workerUrl+"/status",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({itemId:Number(it.id),label:newStatus})});
      if(!rs.ok){
        const errText=await rs.text();
        console.error("status error:",errText);
        throw new Error(errText);
      }
      console.log("Status updated successfully");
    }

    // Désattribue la personne seulement si elle était attribuée
    if(hadPerson){
      const rp=await fetch(CONFIG.workerUrl+"/person",{method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({itemId:Number(it.id),personIds:[]})});
      if(!rp.ok){console.error("person error:",await rp.text());}
    }

    toast(newStatus||"Removed from schedule");
  }catch(e){
    console.error("applyUnschedule error:",e);
    Object.assign(it,snap);
    UNPLANNED=UNPLANNED.filter(x=>x!==it);
    if(wasInItems)ITEMS.push(it);
    if(wasInUnplanned)UNPLANNED.push(it);
    render();
    toast("Error: "+e.message);
  }
}

function toast(msg){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");
  clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2600);}

/* ===================== INIT ===================== */
// Légende priorités uniquement (sans doublons)
const prioLegend=[
  ["Before docking out","var(--p-dock)"],
  ["Before next sailing","var(--p-sail)"],
  ["When possible","var(--p-when)"],
  ["Nice to have","var(--p-nice)"],
  ["Not specified","var(--p-hold)"]
];
document.getElementById("legend").innerHTML=
  prioLegend.map(([label,col])=>
    `<span style="margin-right:10px"><i style="background:${col};border-radius:50%"></i>${label}</span>`).join("");
document.getElementById("prev").onclick=()=>{weekStart.setDate(weekStart.getDate()-7);weekStart=new Date(weekStart);render();};
document.getElementById("next").onclick=()=>{weekStart.setDate(weekStart.getDate()+7);weekStart=new Date(weekStart);render();};
document.getElementById("today-btn").onclick=()=>{weekStart=mondayOf(new Date());render();};
// Toggle sidebar
document.getElementById("toggle-sidebar").onclick=()=>{
  const sb=document.getElementById("sidebar-right");
  const btn=document.getElementById("toggle-sidebar");
  sb.classList.toggle("collapsed");
  btn.textContent=sb.classList.contains("collapsed")?"▶":"◀";
  setTimeout(adjustRowHeights,250); // recalcule après animation
};
load();
refreshTimer=setInterval(load,CONFIG.refreshMs);
</script>
